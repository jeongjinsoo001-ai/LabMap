*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic',sans-serif;background:#f0f2f5;}
#container{display:flex;height:100vh;}
#sidebar{width:290px;background:#fff;border-right:1px solid #ddd;display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
#sidebar-header{background:#1a3a5c;color:#fff;padding:12px 14px;}
#sidebar-header h1{font-size:13px;line-height:1.5;margin-bottom:4px;}
#sidebar-header .sub{font-size:10px;color:#90bde0;}
#controls{padding:10px 12px;border-bottom:1px solid #eee;}
.stats{background:#f8f9fa;border-radius:4px;padding:7px 10px;font-size:11px;color:#555;margin-bottom:10px;}
.stats strong{color:#1a3a5c;}
.filter-title{font-size:10px;font-weight:bold;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;}
.btn-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
.btn{padding:4px 8px;font-size:11px;border:1px solid #ccc;border-radius:3px;cursor:pointer;background:#fff;font-family:'Malgun Gothic',sans-serif;color:#444;}
.btn.active{background:#1a3a5c;color:#fff;border-color:#1a3a5c;}
.btn:hover:not(.active){background:#f0f4f8;}
.legend{margin-top:2px;}
.legend-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:11px;color:#444;}
.dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,0.15);}
#school-list-wrap{flex:1;overflow-y:auto;padding:0 12px 12px;}
.list-header{font-size:10px;font-weight:bold;color:#888;text-transform:uppercase;padding:8px 0 5px;position:sticky;top:0;background:#fff;}
.s-item{padding:7px 0;border-bottom:1px solid #f0f0f0;cursor:pointer;}
.s-item:hover .s-name{color:#1a8be0;}
.s-name{font-size:12px;font-weight:bold;color:#2c3e50;margin-bottom:2px;}
.s-meta{font-size:10px;color:#888;line-height:1.4;}
.badge{display:inline-block;padding:1px 5px;border-radius:2px;font-size:9px;font-weight:bold;color:#fff;margin-right:3px;}
.w1{background:#2196F3;}
.w2{background:#FF9800;}
.w3{background:#27AE60;}
.remote{color:#c0392b;font-weight:bold;}
.alert-box{background:#fff3cd;border:1px solid #ffc107;border-radius:4px;padding:7px 10px;font-size:11px;color:#856404;margin-bottom:10px;}
#map{flex:1;}

/* ── 학교 이름 tooltip ── */
.school-label {
  background: transparent !important;
  border: none !important;
  box-shadow: none !important;
  font-family: 'Malgun Gothic', sans-serif !important;
  font-size: 10px !important;
  font-weight: bold !important;
  color: #111 !important;
  white-space: nowrap !important;
  padding: 1px 2px !important;
  opacity: 0 !important;
  pointer-events: none;
  text-shadow: 0 0 4px #fff, 0 0 4px #fff, 0 0 4px #fff, 0 0 4px #fff;
  line-height: 1.2 !important;
}
.school-label::before { display: none !important; }
.zoom-labels .school-label { opacity: 1 !important; }

/* ── 인쇄(출력) ── */
@media print {
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  #sidebar { display: none !important; }
  #container { display: block !important; height: 100vh; }
  #map { width: 100vw !important; height: 100vh !important; flex: none !important; }
  .school-label { opacity: 1 !important; }
  .leaflet-control-zoom,
  .leaflet-control-attribution,
  .print-btn-wrap { display: none !important; }
}
</style>

const W3_START = new Date(2026, 6, 6); // 2026-07-06
const today    = new Date();
const w3Bright = today >= W3_START;

const W1 = ['6/22','6/23','6/24','6/25','6/26'];
const W2 = ['6/29','6/30','7/1','7/2','7/3'];
const W3 = ['7/6','7/7','7/8','7/9','7/10'];
const SHAPES = ['star','triangle','square','circle1','circle2'];

const W2_COLORS = ['#F57C00','#D32F2F','#F9A825','#F57C00','#D32F2F'];
const W3_DARK   = ['#4E342E','#37474F','#283593','#4A148C','#B71C1C'];
const W3_BRIGHT = ['#F9A825','#F57C00','#D32F2F','#F9A825','#F57C00'];

const dCfg = {};
W1.forEach(d => { dCfg[d] = {c:'#9E9E9E', sh:'circle1'}; });
W2.forEach((d,i) => { dCfg[d] = {c:W2_COLORS[i], sh:SHAPES[i]}; });
W3.forEach((d,i) => { dCfg[d] = {c: w3Bright ? W3_BRIGHT[i] : W3_DARK[i], sh:SHAPES[i]}; });

function txtColor(hex){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return (0.299*r+0.587*g+0.114*b)/255 > 0.45 ? '#222' : '#fff';
}

// ── SVG 마커 생성 ──────────────────────────────────────
const STAR_PTS38 = "19.0,3.0 23.1,13.3 34.2,14.1 25.7,21.2 28.4,31.9 19.0,26.0 9.6,31.9 12.3,21.2 3.8,14.1 14.9,13.3";
const STAR_PTS16 = "8.0,1.5 9.8,5.6 14.2,6.0 10.9,8.9 11.8,13.3 8.0,11.0 4.2,13.3 5.1,8.9 1.8,6.0 6.2,5.6";

function mkSVG(sh, c, tc, lbl, S){
  S = S||38;
  const small = S<=16;
  const cx=S/2, cy=S/2;
  // 별 좌표를 S에 맞게 스케일
  const starPts = small ? STAR_PTS16 : STAR_PTS38;
  const triPts  = small ? "8,1 15,15 1,15" : "19,2 36,36 2,36";
  const triTextY = small ? "12" : "26";
  const sw = small ? 1.5 : 2.5;  // stroke-width
  const font = `font-size="${small?7:9}" font-weight="bold" font-family="Malgun Gothic,sans-serif" fill="${tc}"`;
  const text = (x,y)=>`<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" ${font}>${lbl}</text>`;

  if(sh==='star')
    return `<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}" xmlns="http://www.w3.org/2000/svg">
      <polygon points="${starPts}" fill="${c}" stroke="white" stroke-width="${small?1.5:2}" stroke-linejoin="round"/>
      ${text(cx,cy)}</svg>`;
  if(sh==='triangle')
    return `<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}" xmlns="http://www.w3.org/2000/svg">
      <polygon points="${triPts}" fill="${c}" stroke="white" stroke-width="${sw}" stroke-linejoin="round"/>
      ${text(cx,triTextY)}</svg>`;
  if(sh==='square')
    return `<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}" xmlns="http://www.w3.org/2000/svg">
      <rect x="${small?1.5:3}" y="${small?1.5:3}" width="${S-(small?3:6)}" height="${S-(small?3:6)}" rx="${small?2.5:5}" fill="${c}" stroke="white" stroke-width="${sw}"/>
      ${text(cx,cy)}</svg>`;
  if(sh==='circle1')
    return `<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}" xmlns="http://www.w3.org/2000/svg">
      <circle cx="${cx}" cy="${cy}" r="${cx-(small?1.5:2)}" fill="${c}" stroke="white" stroke-width="${sw}"/>
      ${text(cx,cy)}</svg>`;
  if(sh==='circle2')
    return `<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}" xmlns="http://www.w3.org/2000/svg">
      <circle cx="${cx}" cy="${cy}" r="${cx-(small?4:7)}" fill="${c}"/>
      <circle cx="${cx}" cy="${cy}" r="${cx-(small?2.5:4.5)}" fill="none" stroke="white" stroke-width="${small?1:1.5}"/>
      <circle cx="${cx}" cy="${cy}" r="${cx-(small?1:1.5)}" fill="none" stroke="white" stroke-width="${small?1:1.5}"/>
      ${text(cx,cy)}</svg>`;
  return '';
}

function mkIcon(s){
  const cfg = dCfg[s.d]||{c:'#888',sh:'circle1'};
  const tc  = txtColor(cfg.c);
  return L.divIcon({className:'', html:mkSVG(cfg.sh,cfg.c,tc,s.d,38), iconSize:[38,38], iconAnchor:[19,19]});
}

// ── 팝업 HTML ──────────────────────────────────────────
function popupHTML(s){
  const cfg = dCfg[s.d]||{c:'#888'};
  const noteHtml = s.note
    ? `<div style="color:#c0392b;font-size:10px;margin-top:4px;border-top:1px solid #eee;padding-top:4px;">⚠ ${s.note}</div>`
    : '';
  const wLabel = {w1:'1주차',w2:'2주차',w3:'3주차'};
  return `<div style="font-family:'Malgun Gothic',sans-serif;min-width:220px;">
    <div style="font-weight:bold;font-size:13px;margin-bottom:4px;">${s.n}</div>
    <div style="font-size:11px;color:#555;line-height:1.8;">
      <span style="background:${cfg.c};color:${txtColor(cfg.c)};padding:1px 6px;border-radius:3px;font-weight:bold;margin-right:4px;">${s.d}</span>
      ${wLabel[s.w]||''} · ${s.lv}<br>
      📍 ${s.a}
    </div>
    ${noteHtml}
  </div>`;
}

// ── 지도 초기화 ─────────────────────────────────────────
let curWeek='all', curZone='all';
let markerMap={};
let clusterGroup=null;

const map = L.map('map', {zoomSnap:0.5, zoomDelta:0.5, wheelPxPerZoomLevel:120}).setView([36.010,129.375],11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap contributors', maxZoom:19
}).addTo(map);

// ── render ──────────────────────────────────────────────
function render(){
  if(clusterGroup){ map.removeLayer(clusterGroup); clusterGroup=null; }
  clusterGroup = L.markerClusterGroup({
    maxClusterRadius:50, showCoverageOnHover:false,
    spiderfyOnMaxZoom:true, disableClusteringAtZoom:15,
    iconCreateFunction: function(cluster){
      const ms=cluster.getAllChildMarkers();
      const cnt_={};
      ms.forEach(m=>{
        const fg=m.options.icon.options.html.match(/fill="(#[0-9a-fA-F]{6})"/);
        if(fg) cnt_[fg[1]]=(cnt_[fg[1]]||0)+1;
      });
      const top=Object.entries(cnt_).sort((a,b)=>b[1]-a[1])[0];
      const tc_=top ? top[0] : '#888';
      const cnt=cluster.getChildCount();
      return L.divIcon({className:'',
        html:`<div style="background:${tc_};color:${txtColor(tc_)};border:3px solid rgba(255,255,255,0.85);
          border-radius:50%;width:40px;height:40px;display:flex;align-items:center;
          justify-content:center;font-size:13px;font-weight:bold;
          font-family:'Malgun Gothic',sans-serif;box-shadow:0 3px 8px rgba(0,0,0,0.4);">${cnt}</div>`,
        iconSize:[40,40],iconAnchor:[20,20]});
    }
  });
  markerMap={};
  const filtered=schools.filter(s=>
    (curWeek==='all'||s.w===curWeek)&&(curZone==='all'||s.z===curZone)
  );
  filtered.forEach((s,i)=>{
    const mk=L.marker([s.lat,s.lng],{icon:mkIcon(s)});
    mk.bindPopup(popupHTML(s),{maxWidth:300});
    mk.bindTooltip(s.n,{permanent:true,direction:'top',offset:[0,-22],className:'school-label'});
    clusterGroup.addLayer(mk);
    markerMap[i]=mk;
  });
  map.addLayer(clusterGroup);
  document.getElementById('total-cnt').textContent=filtered.length;
  document.getElementById('list-cnt').textContent=`(${filtered.length})`;
  // 사이드바 학교 목록
  document.getElementById('school-list').innerHTML=filtered.map((s,i)=>{
    const cfg=dCfg[s.d]||{c:'#888',sh:'circle1'};
    const tc=txtColor(cfg.c);
    const miniSVG=mkSVG(cfg.sh,cfg.c,tc,'',16);
    return `<div class="s-item" onclick="flyTo(${i},'${s.d}',${s.lat},${s.lng})">
      <div style="display:flex;align-items:center;gap:5px;">
        ${miniSVG}
        <span style="font-weight:bold;font-size:11px;">${s.n}</span>
      </div>
      <div class="s-meta">
        <span style="background:${cfg.c};color:${tc};padding:1px 5px;border-radius:2px;font-size:9px;font-weight:bold;margin-right:3px;">${s.d}</span>
        ${s.lv}${s.z==='원거리'?' <span style=\"color:#e74c3c;font-size:9px;\">🚗 원거리</span>':''}
      </div>
    </div>`;
  }).join('');
  window._filtered=filtered;
}

function flyTo(i,d,lat,lng){
  map.flyTo([lat,lng],15,{duration:1.2});
  setTimeout(()=>{
    if(markerMap[i]){
      if(clusterGroup) clusterGroup.zoomToShowLayer(markerMap[i],()=>{markerMap[i].openPopup();});
      else markerMap[i].openPopup();
    }
  },1300);
}

function setWeek(w){
  curWeek=w;
  ['all-w','w1','w2','w3'].forEach(x=>{
    const b=document.getElementById('btn-'+x);
    if(b) b.classList.toggle('active', x===w);
  });
  render();
}
function setZone(z){
  curZone=z;
  ['all-z','북구시내','흥해읍','남구','원거리'].forEach((x,i)=>{
    const b=document.getElementById('btn-'+['all-z','z1','z2','z3','z4'][i]);
    if(b) b.classList.toggle('active', x===z);
  });
  render();
}
